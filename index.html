<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Beantime — Pourover Timer</title>

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Mono:wght@300;400;500&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">

  <!-- Favicon -->
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>☕</text></svg>">

  <!-- Styles -->
  <link rel="stylesheet" href="styles.css">
</head>
<body>
<div class="app">

  <header>
    <div>
      <div class="logo">Bean<span>time</span></div>
      <div class="header-subtitle">Precision brewing timer</div>
    </div>
  </header>

  <nav>
    <button class="nav-btn active" data-action="switch-view" data-view="brew">Brew</button>
    <button class="nav-btn" data-action="switch-view" data-view="recipes">Recipes</button>
    <button class="nav-btn" data-action="switch-view" data-view="history">History</button>
  </nav>

  <!-- ─── BREW VIEW ─── -->
  <div id="view-brew" class="view active">

    <div class="card setup-section" id="setup-panel">
      <div class="card-title">Setup</div>

      <div class="recipe-selector">
        <div style="flex:1">
          <label for="recipe-select">Recipe</label>
          <select id="recipe-select" data-action="recipe-change"></select>
        </div>
      </div>

      <div class="form-group">
        <label for="bean-input">Beans</label>
        <input
          type="text"
          id="bean-input"
          list="beans-datalist"
          placeholder="e.g. Ethiopia Yirgacheffe"
          autocomplete="off"
        >
        <datalist id="beans-datalist"></datalist>
      </div>

      <div class="brew-inputs">
        <div class="big-input-wrap">
          <label for="coffee-grams">Coffee</label>
          <input type="number" id="coffee-grams" value="20" min="5" max="100" step="0.5" data-action="update-water">
          <div class="big-input-unit">grams</div>
        </div>
        <div class="big-input-wrap">
          <label for="water-grams">Total water</label>
          <input type="number" id="water-grams" value="300" min="50" max="2000" step="1" data-action="water-change">
          <div class="big-input-unit">grams</div>
        </div>
      </div>

      <div class="ratio-info" id="ratio-display">Ratio 1:15 — 5 pours — 300g total</div>

      <div class="section-header" style="margin-bottom: 0.75rem;">
        <div style="font-size: 13px; font-weight: 500; color: var(--ink-mid);">Pour steps</div>
      </div>

      <div class="steps-list" id="preview-steps"></div>

      <div style="margin-top: 1.25rem;">
        <button class="btn btn-primary btn-full" data-action="start-brew">Start brewing</button>
      </div>
    </div>

    <!-- Active timer -->
    <div id="active-timer" style="display:none">
      <div class="timer-display" id="timer-display">
        <div class="step-label" id="step-label">Step 1 of 5</div>
        <div class="step-name" id="step-name">Bloom</div>
        <div class="pour-amount" id="pour-amount">60 <span>g</span></div>
        <div class="pour-this-step" id="pour-this-step">+60g this pour</div>
        <div class="timer-clock" id="timer-clock">0:45</div>
        <div class="timer-status" id="timer-status">pouring</div>
      </div>

      <div class="steps-progress" id="steps-progress">
        <div class="steps-track" id="steps-track"></div>
        <div class="steps-list" id="active-steps-list"></div>
      </div>

      <div class="timer-controls">
        <button class="btn btn-outline" data-action="prev-step">← Back</button>
        <button class="btn btn-primary" data-action="next-step" id="next-btn">Next step →</button>
      </div>

      <div class="timer-controls three">
        <button class="btn btn-outline btn-sm" data-action="toggle-pause" id="pause-btn">Pause</button>
        <button class="btn btn-outline btn-sm" data-action="reset-brew">Reset</button>
        <button class="btn btn-danger btn-sm" data-action="stop-brew">Stop</button>
      </div>

    </div>

    <!-- Done state -->
    <div class="timer-done" id="timer-done">
      <h2>Enjoy your brew ☕</h2>
      <p id="done-summary" style="margin-bottom:1rem;"></p>
      <div class="form-group" style="text-align:left;">
        <label for="session-notes">Notes</label>
        <textarea id="session-notes" placeholder="How did it taste? Grind size, water temp, bloom time..."></textarea>
      </div>
      <button class="btn btn-primary" data-action="save-session">Save to history</button>
      <button class="btn btn-outline" style="margin-left:0.5rem;" data-action="brew-again">Brew again</button>
    </div>

  </div>

  <!-- ─── RECIPES VIEW ─── -->
  <div id="view-recipes" class="view">

    <div class="section-header">
      <div class="section-title">Recipes</div>
      <button class="btn btn-primary btn-sm" data-action="show-editor">+ New recipe</button>
    </div>

    <div id="recipes-list"></div>

    <!-- Recipe editor -->
    <div class="recipe-editor" id="recipe-editor" style="display:none">
      <div class="editor-title" id="editor-title">New recipe</div>

      <div class="form-row">
        <div class="form-group" style="margin-bottom:0">
          <label for="r-name">Recipe name</label>
          <input type="text" id="r-name" placeholder="e.g. My 4:6 bright">
        </div>
        <div class="form-group" style="margin-bottom:0">
          <label for="r-ratio">Water ratio (1:X)</label>
          <input type="number" id="r-ratio" value="15" min="10" max="20" step="0.5">
        </div>
      </div>

      <div class="form-group" style="margin-top: 1rem;">
        <label for="r-desc">Description (optional)</label>
        <input type="text" id="r-desc" placeholder="Balanced, sweet, good for washed light roasts">
      </div>

      <hr class="divider">

      <div style="font-size: 12px; font-weight: 500; color: var(--ink-light); letter-spacing: 0.05em; text-transform: uppercase; margin-bottom: 0.75rem;">
        Pour steps <span style="font-weight: 400; text-transform: none; font-size: 11px;">(% of total water per step)</span>
      </div>

      <div class="pour-steps-editor" id="pour-steps-editor"></div>

      <div id="steps-warning" class="validation-warning"></div>

      <button class="btn btn-outline btn-sm" data-action="add-step" style="margin-bottom:1rem;">+ Add step</button>

      <hr class="divider">

      <div style="display:flex; gap: 0.75rem; justify-content: flex-end;">
        <button class="btn btn-outline" data-action="cancel-editor">Cancel</button>
        <button class="btn btn-primary" data-action="save-recipe">Save recipe</button>
      </div>
    </div>

  </div>

  <!-- ─── HISTORY VIEW ─── -->
  <div id="view-history" class="view">

    <div class="section-header">
      <div class="section-title">Brew history</div>
      <button class="btn btn-outline btn-sm btn-danger" data-action="clear-history" id="clear-history-btn">Clear all</button>
    </div>

    <div id="history-list"></div>

  </div>

</div>

<div class="toast" id="toast"></div>

<!-- App logic — loaded at end of body so DOM is ready -->
<script src="app.js" defer></script>
</body>
</html>
